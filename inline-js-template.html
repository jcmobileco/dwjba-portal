<script>
// ── Header scroll shadow ───────────────────────────────────
const hdr = document.getElementById('siteHeader');
window.addEventListener('scroll', () => {
  hdr.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

// ── Mobile nav ────────────────────────────────────────────
const mobNav   = document.getElementById('mobNav');
const scrim    = document.getElementById('scrim');
const openBtn  = document.getElementById('mobMenuBtn');
const closeBtn = document.getElementById('mobCloseBtn');

function openMob()  { mobNav.classList.add('open'); scrim.classList.add('visible'); document.body.style.overflow='hidden'; }
function closeMob() { mobNav.classList.remove('open'); scrim.classList.remove('visible'); document.body.style.overflow=''; }

openBtn.addEventListener('click', openMob);
closeBtn.addEventListener('click', closeMob);
scrim.addEventListener('click', closeMob);
</script>
